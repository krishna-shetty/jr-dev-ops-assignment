# NOTE: This workflow assumes a Unix-based runner (Linux/macOS) since it relies
# on Bash scripts and `chmod` for execution.

name: Run Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # Pretty self-explanatory: give execute permission to runner 
      - name: Make scripts executable
        run: |
          chmod +x build.sh
          chmod +x upload.sh
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          appName="Test App"
          ./build.sh --platform Android --project-name "$appName"

      # CLI call to simulated upload process
      - name: Upload
        run: |
          ./upload.sh build/Android"