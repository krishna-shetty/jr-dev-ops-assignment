# NOTE: This workflow assumes a Unix-based runner (Linux/macOS) since it relies
# on Bash scripts and `chmod` for execution.

name: Build pipeline

# Utilizing optional custom input parameters
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Custom name for the built application"
        required: true
        default: "PrismsVR"
      version_prefix:
        description: "Fallback MAJOR.MINOR version when build is not tag-driven"
        required: false
        default: "1.0"
      profile:
        description: "Generate profiling data"
        required: false
        type: boolean
        default: false

  pull_request:
    branches:
      - main

  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  # Static analysis
  # Cheapest tollgate — run against source code before anything else.
  # Fail fast, fail hard. To avoid wasting time on build.
  static-analysis:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [Android, iOS]

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

        # Pretty self-explanatory: give execute permission to runner
      - name: Make scripts executable
        run: chmod +x scan_static.sh

      - name: Run static analysis
        run: ./scan_static.sh --platform "${{ matrix.platform }}"

  build:
    needs: static-analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [Android, iOS]

    env:
      PLATFORM: ${{ matrix.platform }}
      PROFILE: ${{ inputs.profile || 'false' }}

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: |
          chmod +x build.sh

      # Follows semantic versioning 2.0.0 in spirit, using MAJOR.MINOR tags
      # (e.g. v1.2) as explicit engineer-owned release intent.
      #
      # PATCH is derived from commit distance since the nearest reachable
      # version tag on main, so it increments naturally and resets when a new
      # MAJOR.MINOR tag is pushed.
      #
      # Version-resolution notes below were generated with Claude Sonnet and then
      # reviewed/edited manually for this workflow.
      - name: Compute app name and version
        shell: bash
        run: |
          set -euo pipefail

          DEFAULT_APP_NAME="PrismsVR"
          DEFAULT_VERSION_PREFIX="1.0"

          BASE_APP_NAME="${{ inputs.app_name || '' }}"
          VERSION_PREFIX_INPUT="${{ inputs.version_prefix || '' }}"

          if [[ -z "${BASE_APP_NAME}" ]]; then
            BASE_APP_NAME="${DEFAULT_APP_NAME}"
          fi

          if [[ -z "${VERSION_PREFIX_INPUT}" ]]; then
            VERSION_PREFIX_INPUT="${DEFAULT_VERSION_PREFIX}"
          fi

          REF_NAME="${GITHUB_REF_NAME}"
          REF_TYPE="${GITHUB_REF_TYPE}"
          EVENT_NAME="${GITHUB_EVENT_NAME}"

          BRANCH=""
          BRANCH_SUFFIX=""

          git fetch origin main --quiet

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
          elif [[ "${REF_TYPE}" == "tag" ]]; then
            # Tag pushes are detached refs; we treat them as promoted artifacts
            # associated with main for naming/version lookup purposes.
            BRANCH="main"
          else
            BRANCH="${REF_NAME}"
          fi

          # Version resolution logic (initial version of this approach was generated
          # with Claude, then reviewed and adjusted manually):
          #
          # - Resolve version lineage from the nearest reachable vMAJOR.MINOR tag on main
          # - Ignore tags not contained in origin/main
          # - Fall back to version_prefix input if no promoted tag exists yet
          #
          # git describe returns the nearest reachable tag and, in --long form,
          # includes the commit count since that tag.
          DESCRIBE_LONG="$(git describe --tags --match 'v[0-9]*.[0-9]*' --long origin/main 2>/dev/null || true)"
          RAW_TAG="$(git describe --tags --match 'v[0-9]*.[0-9]*' --abbrev=0 origin/main 2>/dev/null || true)"

          if [[ -n "${RAW_TAG}" ]]; then
            VERSION_PREFIX="${RAW_TAG#v}"
            PATCH="$(echo "${DESCRIBE_LONG}" | sed -E 's/.*-([0-9]+)-g[0-9a-f]+/\1/')"
          else
            VERSION_PREFIX="${VERSION_PREFIX_INPUT}"
            PATCH="$(git rev-list --count origin/main)"
          fi

          VERSION="${VERSION_PREFIX}.${PATCH}"

          # Naming policy:
          # - main uses clean artifact naming
          # - non-main branches get a suffix
          # - workflow_dispatch on main gets -dev to distinguish ad hoc manual builds
          if [[ "${BRANCH}" == "main" ]]; then
            if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
              BRANCH_SUFFIX="-dev"
            fi
          else
            SAFE_BRANCH="$(echo "${BRANCH}" | tr '/' '-')"
            BRANCH_SUFFIX="-${SAFE_BRANCH}"
          fi

          EXTENSION="apk"
          if [[ "${PLATFORM}" == "iOS" ]]; then
            EXTENSION="ipa"
          fi

          PROJECT_NAME="${BASE_APP_NAME}${BRANCH_SUFFIX}"
          ARTIFACT_NAME="${PROJECT_NAME}-${VERSION}"
          ARTIFACT_PATH="build/${PLATFORM}/${ARTIFACT_NAME}.${EXTENSION}"

          echo "PROJECT_NAME=${PROJECT_NAME}"   >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}"             >> "$GITHUB_ENV"
          echo "BRANCH=${BRANCH}"               >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=${ARTIFACT_PATH}" >> "$GITHUB_ENV"

          # ── Job summary ────────────────────────────────────────────────────
          # formatted with Claude Sonnet
          echo "## Build Info"                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Field    | Value |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "| -------- | ----- |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | \`${PLATFORM}\` |"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch   | \`${BRANCH}\` |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Version  | \`${VERSION}\` |"           >> "$GITHUB_STEP_SUMMARY"
          echo "| App      | \`${PROJECT_NAME}\` |"      >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger  | \`${EVENT_NAME}\` |"        >> "$GITHUB_STEP_SUMMARY"

      # CLI call to simulated build process
      - name: Run Build
        run: |
          PROFILE_FLAG=""

          if [[ "${PROFILE}" == "true" ]]; then
            PROFILE_FLAG="--profile"
          fi

          ./build.sh --platform "$PLATFORM" --project-name "$PROJECT_NAME" --version "$VERSION" ${PROFILE_FLAG}

      # Artifact name uses run_id so downstream jobs can reference it 
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ github.run_id }}
          path: ./cli/${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
      
      # Upload profiling data generated by build.sh (*.pro files)
      - name: Upload profiling data to Actions
        if: env.PROFILE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-${{ env.PLATFORM }}-${{ env.ARTIFACT_NAME }}
          path: ./cli/build/${{ env.PLATFORM }}/*.pro
          if-no-files-found: error
      
  # Deploy to QA
  # Automatic deployment to QA on every push to main.
  # No manual approval here - QA picks up the build from this environment.
  # The pipeline then promotes through QA -> pre-prod -> prod,
  # with manual validation required for pre-prod and prod.

  deploy_qa:
    needs: build
    # Upload policy:
    # - upload on any push to main
    # - do not upload for PRs or non-main branch pushes
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [Android, iOS]

    environment: qa

    env:
      UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
      PLATFORM: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x upload.sh

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ github.run_id }}
          path: ./cli/build/${{ matrix.platform }}

      - name: Deploy to QA
        shell: bash
        run: |
          UPLOAD_PLATFORM="android"
          if [[ "$PLATFORM" == "iOS" ]]; then
            UPLOAD_PLATFORM="ios"
          fi

          ARTIFACT=$(find ./build/${{ matrix.platform }} -type f \( -name "*.apk" -o -name "*.ipa" \) | head -1)

          if [[ -z "$ARTIFACT" ]]; then
            echo "[ERROR] No artifact found for ${PLATFORM}"
            exit 1
          fi

          ./upload.sh "$UPLOAD_PLATFORM" "$ARTIFACT"

  # QA tests
  # Dynamic tests to run after QA deployment.
  # All things (tests) must pass ... before pre-prod gate opens.

  qa_tests:
    needs: deploy_qa
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        platform: [Android, iOS]

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scan_dynamic.sh

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ github.run_id }}
          path: ./cli/build/${{ matrix.platform }}

      - name: Run dynamic tests
        run: |
          ARTIFACT=$(find ./build/${{ matrix.platform }} -type f \( -name "*.apk" -o -name "*.ipa" \) | head -1)

          if [[ -z "$ARTIFACT" ]]; then
            echo "[ERROR] No artifact found for ${PLATFORM}"
            exit 1
          fi

          ./scan_dynamic.sh --platform "${{ matrix.platform }}" --artifact "$ARTIFACT"    

  # Deploy to pre-prod
  # Manual gate - QA lead signs off in GitHub environments UI.
  # Pre-prod mirrors the production deployment path and acts as the final validation stage before production promotion.
  
  deploy_preprod:
    needs: qa_tests
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest
 
    strategy:
      matrix:
        platform: [Android, iOS]
 
    environment: preprod
 
    env:
      UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
      PLATFORM: ${{ matrix.platform }}
 
    defaults:
      run:
        working-directory: ./cli
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Make scripts executable
        run: chmod +x upload.sh
 
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ github.run_id }}
          path: ./cli/build/${{ matrix.platform }}
 
      - name: Deploy to pre-prod
        shell: bash
        run: |
          UPLOAD_PLATFORM="android"
          if [[ "${PLATFORM}" == "iOS" ]]; then
            UPLOAD_PLATFORM="ios"
          fi
          ARTIFACT=$(find ./build/${{ matrix.platform }} -type f \( -name "*.apk" -o -name "*.ipa" \) | head -1)

          if [[ -z "$ARTIFACT" ]]; then
            echo "[ERROR] No artifact found for ${PLATFORM}"
            exit 1
          fi

          ./upload.sh "$UPLOAD_PLATFORM" "$ARTIFACT"

  # Deploy to production!
  # Manual gate - stakeholders sign off in Github environments.

  deploy_prod:
    needs: deploy_preprod
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest
 
    strategy:
      matrix:
        platform: [Android, iOS]
 
    environment: prod
 
    env:
      UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
      PLATFORM: ${{ matrix.platform }}
 
    defaults:
      run:
        working-directory: ./cli
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Make scripts executable
        run: chmod +x upload.sh
 
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ github.run_id }}
          path: ./cli/build/${{ matrix.platform }}
 
      - name: Deploy to production
        shell: bash
        run: |
          UPLOAD_PLATFORM="android"
          if [[ "${PLATFORM}" == "iOS" ]]; then
            UPLOAD_PLATFORM="ios"
          fi
          ARTIFACT=$(find ./build/${{ matrix.platform }} -type f \( -name "*.apk" -o -name "*.ipa" \) | head -1)

          if [[ -z "$ARTIFACT" ]]; then
            echo "[ERROR] No artifact found for ${PLATFORM}"
            exit 1
          fi

          ./upload.sh "$UPLOAD_PLATFORM" "$ARTIFACT"